<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scotland Roadtrip Planner Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --bg: #0f172a;
            --sidebar-bg: #020617;
            --accent: #3b82f6;
            --border: #1e293b;
            --text: #f8fafc;
        }

        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; height: 60px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border);
        }

        .container { display: grid; grid-template-columns: 420px 1fr; height: calc(100vh - 60px); }
        
        .sidebar { 
            background: var(--sidebar-bg); overflow-y: auto; padding: 20px; 
            border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px;
        }

        /* Collapsible Form Styling */
        .collapsible-header {
            background: #1e293b; padding: 12px; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; font-weight: bold;
        }
        .add-form { 
            background: #1e293b; padding: 15px; border-radius: 0 0 8px 8px; 
            display: none; flex-direction: column; gap: 10px; border-top: 1px solid #334155;
        }
        .add-form.active { display: flex; }

        .add-form input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 4px; }
        
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        select { flex-grow: 1; background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { text-align: left; padding: 10px; background: #1e293b; color: #94a3b8; }
        td { padding: 10px; border-bottom: 1px solid var(--border); }

        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 8px 12px; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; width: 100%; }
        .btn-danger { background: #ef4444; color: white; padding: 4px 8px; }

        #map { height: 100%; background: #1e293b; }
        
        /* Hide routing panel */
        .leaflet-routing-container { display: none !important; }

        .loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7);
            display:none; justify-content: center; align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">Processing route...</div>

<header>
    <h1>🏴 Scotland Planner</h1>
</header>

<div class="container">
    <div class="sidebar">
        
        <!-- Collapsible Section -->
        <div>
            <div class="collapsible-header" onclick="toggleForm()">
                <span>📍 Add New Stop</span>
                <span id="toggleIcon">+</span>
            </div>
            <div id="addForm" class="add-form">
                <input type="date" id="newDate">
                <!-- Autocomplete inputs using datalists -->
                <input type="text" id="newFrom" placeholder="From..." list="geoList" oninput="doAutocomplete(this)">
                <input type="text" id="newTo" placeholder="To..." list="geoList" oninput="doAutocomplete(this)">
                <button class="btn btn-primary" onclick="handleAddStop()">Add to Itinerary</button>
            </div>
        </div>

        <datalist id="geoList"></datalist>

        <div class="controls">
            <select id="dateFilter" onchange="renderTable()"></select>
        </div>

        <table id="tripTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Route</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="map">
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwwbNCACyB7_tqnaAAkPsd1pIjFNgTHWX412r6s51F8tz5svGwqFsh5f5Sw_QJ8Kd--/exec"; 
    
    let trip = [];
    let geoCache = new Map();
    const map = L.map("map").setView([56.5, -4], 7);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let routingControl;
    let markers = [];

    // --- UI LOGIC ---

    function toggleForm() {
        const form = document.getElementById("addForm");
        const icon = document.getElementById("toggleIcon");
        form.classList.toggle("active");
        icon.textContent = form.classList.contains("active") ? "−" : "+";
    }

    // --- AUTOCOMPLETE LOGIC ---

    let autoTimer;
    function doAutocomplete(input) {
        clearTimeout(autoTimer);
        const val = input.value;
        if (val.length < 3) return;

        // Debounce API calls to avoid hitting limits
        autoTimer = setTimeout(async () => {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val + ", Scotland")}&limit=5`;
            const r = await fetch(url);
            const d = await r.json();
            const list = document.getElementById("geoList");
            list.innerHTML = "";
            d.forEach(item => {
                const opt = document.createElement("option");
                opt.value = item.display_name.split(',')[0] + ", " + item.display_name.split(',')[1];
                list.appendChild(opt);
            });
        }, 400);
    }

    // --- DATA & MAP LOGIC ---

    function formatDateDisplay(rawDate) {
        if (!rawDate) return "";
        const date = new Date(rawDate);
        if (isNaN(date.getTime())) return rawDate;
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        const weekdays = ["dom", "lun", "mar", "mer", "gio", "ven", "sab"];
        return `${day}-${month}-${year} [${weekdays[date.getDay()]}]`;
    }

    async function loadData() {
        showLoader(true);
        const res = await fetch(API);
        trip = await res.json();
        buildDateFilter();
        renderTable();
        showLoader(false);
    }

    function buildDateFilter() {
        const uniqueDates = [...new Set(trip.map(t => t.date))];
        const select = document.getElementById("dateFilter");
        select.innerHTML = "<option value='all'>Full Trip View</option>";
        uniqueDates.forEach(d => {
            const o = document.createElement("option");
            o.value = d;
            o.textContent = formatDateDisplay(d);
            select.appendChild(o);
        });
    }

    async function renderTable() {
        const tbody = document.querySelector("#tripTable tbody");
        tbody.innerHTML = "";
        const filter = document.getElementById("dateFilter").value;
        const visibleStops = trip.filter(t => filter === "all" || t.date === filter);

        visibleStops.forEach((t) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td style="white-space:nowrap">${formatDateDisplay(t.date)}</td>
                <td><strong>${t.from.split(',')[0]}</strong><br><span style="color:#94a3b8">→ ${t.to.split(',')[0]}</span></td>
                <td><button class="btn btn-danger" onclick="deleteStop(${t.id})">✕</button></td>
            `;
            tbody.appendChild(tr);
        });

        updateMap(visibleStops);
    }

    async function geocode(place) {
        const query = place.includes("Scotland") ? place : place + ", Scotland";
        if (geoCache.has(query)) return geoCache.get(query);

        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`;
        try {
            const r = await fetch(url);
            const d = await r.json();
            if (d && d.length > 0) {
                const coords = [parseFloat(d[0].lat), parseFloat(d[0].lon)];
                geoCache.set(query, coords);
                return coords;
            }
        } catch (e) { console.error(e); }
        return null;
    }

    async function updateMap(visibleStops) {
        if (routingControl) map.removeControl(routingControl);
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        let waypointCoords = [];

        // Build a unique list of points to visit in order
        for (const stop of visibleStops) {
            const c1 = await geocode(stop.from);
            const c2 = await geocode(stop.to);

            if (c1) waypointCoords.push(L.latLng(c1[0], c1[1]));
            if (c2) waypointCoords.push(L.latLng(c2[0], c2[1]));

            // Add markers for the UI
            if (c1) markers.push(L.circleMarker(c1, {radius:6, color:'#3b82f6'}).addTo(map).bindPopup(stop.from));
            if (c2) markers.push(L.circleMarker(c2, {radius:6, color:'#10b981'}).addTo(map).bindPopup(stop.to));
        }

        if (waypointCoords.length > 1) {
            routingControl = L.Routing.control({
                waypoints: waypointCoords,
                router: L.Routing.osrmv1({ serviceUrl: `https://router.project-osrm.org/route/v1` }),
                lineOptions: { styles: [{ color: '#3b82f6', opacity: 0.6, weight: 6 }] },
                createMarker: () => null,
                show: false,
                addWaypoints: false
            }).addTo(map);

            // Fit map to show the whole route
            const group = new L.featureGroup(markers);
            map.fitBounds(group.getBounds().pad(0.1));
        }
    }

    async function handleAddStop() {
        const date = document.getElementById("newDate").value;
        const from = document.getElementById("newFrom").value;
        const to = document.getElementById("newTo").value;

        if (!date || !from || !to) return alert("Please fill all fields");

        showLoader(true);
        await fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "add", date, from, to })
        });
        
        document.getElementById("newFrom").value = "";
        document.getElementById("newTo").value = "";
        toggleForm(); // Collapse after adding
        loadData();
    }

    async function deleteStop(id) {
        if (!confirm("Remove this leg?")) return;
        showLoader(true);
        await fetch(API, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) });
        loadData();
    }

    function showLoader(show) {
        document.getElementById("loader").style.display = show ? "flex" : "none";
    }

    loadData();
</script>

</body>
</html>
