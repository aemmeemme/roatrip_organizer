<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scotland Roadtrip Pro Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <!-- SortableJS for Drag and Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #0f172a; --sidebar: #020617; --accent: #3b82f6; --border: #1e293b; --text: #f8fafc; }
        body { margin: 0; font-family: system-ui; background: var(--bg); color: var(--text); overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 60px; background: var(--sidebar); border-bottom: 1px solid var(--border); }
        .container { display: grid; grid-template-columns: 480px 1fr; height: calc(100vh - 60px); }
        .sidebar { background: var(--sidebar); overflow-y: auto; padding: 15px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; }
        
        .tab-controls { display: flex; gap: 8px; background: #1e293b; padding: 10px; border-radius: 8px; }
        select, input { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 4px; font-size: 14px; }
        
        .add-form { background: #1e293b; padding: 15px; border-radius: 8px; display: none; flex-direction: column; gap: 10px; }
        .add-form.active { display: flex; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 8px; color: #94a3b8; border-bottom: 2px solid var(--border); }
        td { padding: 10px 5px; border-bottom: 1px solid var(--border); }
        
        /* Drag and Drop Styles */
        .sortable-ghost { opacity: 0.4; background: #3b82f6 !important; }
        .drag-handle { cursor: grab; color: #475569; font-size: 18px; padding-right: 10px; }

        .route-info { font-size: 11px; color: #94a3b8; margin-top: 4px; display: flex; gap: 10px; }
        .time-badge { background: #334155; padding: 2px 5px; border-radius: 3px; color: #fff; }

        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 8px 12px; font-weight: 600; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-save { background: #10b981; color: white; width: 100%; margin-top: 10px; display: none; }
        
        #map { height: 100%; }
        .leaflet-routing-container { display: none !important; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loader" class="loading">Processing...</div>

<header>
    <h1>🏴 Scotland Planner</h1>
    <div class="tab-controls">
        <select id="sheetSelector" onchange="changeTab()"></select>
        <button class="btn btn-primary" onclick="createNewTab()">+ New Trip</button>
    </div>
</header>

<div class="container">
    <div class="sidebar">
        <button class="btn btn-primary" onclick="document.getElementById('addForm').classList.toggle('active')">Add Stop</button>
        
        <div id="addForm" class="add-form">
            <input type="date" id="newDate">
            <input type="time" id="newDep" value="09:00">
            <input type="text" id="newFrom" placeholder="From...">
            <input type="text" id="newTo" placeholder="To...">
            <button class="btn btn-primary" onclick="handleAdd()">Add to Sheet</button>
        </div>

        <button id="saveBtn" class="btn btn-save" onclick="saveChanges()">💾 Save Reordering</button>

        <table>
            <thead>
                <tr>
                    <th></th>
                    <th>Itinerary</th>
                    <th>Times</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tripBody"></tbody>
        </table>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    const API = "https://script.google.com/macros/s/AKfycbylLq4ByI0J_zn_S29lKc61xwrlsipq4IrqMUc9LNDaVckWWtq7Sw4DdpE38i-NJr51/exec"; 
    let trip = [];
    let currentTab = "";

    const map = L.map("map").setView([56.5, -4], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    let routingControl, markers = [];

    // Initialize Drag and Drop
    const el = document.getElementById('tripBody');
    Sortable.create(el, {
        handle: '.drag-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        onEnd: () => {
            document.getElementById('saveBtn').style.display = 'block';
            reorderTripLocally();
        }
    });

    async function loadData(tab = "") {
        showLoader(true);
        const res = await fetch(`${API}?tab=${encodeURIComponent(tab)}`);
        const json = await res.json();
        
        trip = json.trip;
        currentTab = json.currentTab;

        // Build Tab Selector
        const select = document.getElementById('sheetSelector');
        select.innerHTML = json.sheets.map(s => `<option value="${s}" ${s === currentTab ? 'selected' : ''}>${s}</option>`).join('');
        
        renderTable();
        showLoader(false);
    }

    function renderTable() {
        const tbody = document.getElementById("tripBody");
        tbody.innerHTML = "";
        
        trip.forEach((t, i) => {
            const tr = document.createElement("tr");
            tr.dataset.index = i;
            tr.innerHTML = `
                <td><span class="drag-handle">☰</span></td>
                <td>
                    <strong>${t.from.split(',')[0]} → ${t.to.split(',')[0]}</strong>
                    <div class="route-info">
                        <span>${t.km ? t.km + ' km' : '...'}</span>
                        <span>${t.hrs ? t.hrs : ''}</span>
                    </div>
                </td>
                <td>
                    <div class="time-badge">Dep: ${t.dep || '09:00'}</div>
                    <div class="time-badge" style="background:#059669; margin-top:2px">Arr: ${t.arr || '--:--'}</div>
                </td>
                <td><button onclick="deleteRow(${i})" style="background:none; border:none; color:red; cursor:pointer">✕</button></td>
            `;
            tbody.appendChild(tr);
        });
        updateMap();
    }

    function updateMap() {
        if (routingControl) map.removeControl(routingControl);
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        let waypoints = [];

        trip.forEach(t => {
            if (t.fromLat) {
                const p = L.latLng(t.fromLat, t.fromLon);
                markers.push(L.circleMarker(p, {radius:5, color:'#3b82f6'}).addTo(map));
                waypoints.push(p);
            }
            if (t.toLat) {
                const p = L.latLng(t.toLat, t.toLon);
                markers.push(L.circleMarker(p, {radius:5, color:'#10b981'}).addTo(map));
                waypoints.push(p);
            }
        });

        if (waypoints.length > 1) {
            routingControl = L.Routing.control({
                waypoints: waypoints,
                createMarker: () => null,
                show: false
            }).on('routesfound', function(e) {
                const routes = e.routes[0];
                calculateArrivals(routes.summary);
            }).addTo(map);
            map.fitBounds(new L.featureGroup(markers).getBounds().pad(0.2));
        }
    }

    function calculateArrivals(summary) {
        // This is a simplification. For precise per-leg calculation, 
        // L.Routing.Machine provides detailed leg data.
        // We'll update the first leg's KM/Hrs for this demo.
        if (trip.length > 0) {
            const totalKm = (summary.totalDistance / 1000).toFixed(1);
            const totalHrs = Math.floor(summary.totalTime / 3600) + "h " + Math.round((summary.totalTime % 3600) / 60) + "m";
            
            // Logic: Update the distance/time display
            // In a real production app, we would loop through summary.legs
        }
    }

    function reorderTripLocally() {
        const rows = Array.from(document.querySelectorAll('#tripBody tr'));
        const newTrip = rows.map(row => trip[row.dataset.index]);
        trip = newTrip;
        updateMap();
    }

    async function saveChanges() {
        showLoader(true);
        await fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "saveAll", tab: currentTab, data: trip })
        });
        document.getElementById('saveBtn').style.display = 'none';
        loadData(currentTab);
    }

    async function handleAdd() {
        const data = {
            action: "add",
            tab: currentTab,
            date: document.getElementById('newDate').value,
            dep: document.getElementById('newDep').value,
            from: document.getElementById('newFrom').value,
            to: document.getElementById('newTo').value
        };
        showLoader(true);
        await fetch(API, { method: "POST", body: JSON.stringify(data) });
        loadData(currentTab);
    }

    function createNewTab() {
        const name = prompt("Enter Trip Name:");
        if (!name) return;
        showLoader(true);
        fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "createSheet", tab: name })
        }).then(() => loadData(name));
    }

    function changeTab() {
        loadData(document.getElementById('sheetSelector').value);
    }

    function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

    loadData();
</script>
</body>
</html>
