<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Roadtrip Pro Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #0f172a; --sidebar: #020617; --accent: #3b82f6; --border: #1e293b; --text: #f8fafc; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; height: 60px; background: var(--sidebar); border-bottom: 1px solid var(--border); 
        }

        .container { display: grid; grid-template-columns: 460px 1fr; height: calc(100vh - 60px); }
        
        .sidebar { 
            background: var(--sidebar); overflow-y: auto; padding: 15px; 
            border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; 
        }
        
        .controls-group { display: flex; flex-direction: column; gap: 8px; background: #1e293b; padding: 12px; border-radius: 8px; }
        .row { display: flex; gap: 8px; }
        
        select, input { 
            background: #0f172a; border: 1px solid #334155; color: white; 
            padding: 10px; border-radius: 6px; font-size: 13px; flex-grow: 1;
        }
        
        .add-form { 
            background: #1e293b; padding: 15px; border-radius: 8px; 
            display: none; flex-direction: column; gap: 10px; border: 1px solid var(--accent);
        }
        .add-form.active { display: flex; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th { text-align: left; padding: 8px; color: #94a3b8; border-bottom: 2px solid var(--border); }
        td { padding: 10px 5px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        
        .drag-handle { cursor: grab; color: #475569; font-size: 18px; padding-right: 8px; }
        .route-info { font-size: 11px; color: #94a3b8; margin-top: 4px; display: flex; gap: 8px; }
        .time-badge { background: #334155; padding: 2px 6px; border-radius: 4px; color: #fff; font-family: monospace; }

        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 10px 15px; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-save { background: #10b981; color: white; width: 100%; margin-bottom: 10px; display: none; }
        .btn:hover { opacity: 0.8; }

        #map { height: 100%; background: #020617; }
        .leaflet-routing-container { display: none !important; }
        
        .loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: none; justify-content: center; 
            align-items: center; z-index: 9999; flex-direction: column; gap: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loading">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;"></div>
    <span>Processing Map...</span>
</div>

<header>
    <h1>🏴 Roadtrip Planner</h1>
    <div class="row">
        <select id="sheetSelector" onchange="changeTab()"></select>
        <button class="btn btn-primary" onclick="createNewTab()">+ New Trip</button>
    </div>
</header>

<div class="container">
    <div class="sidebar">
        
        <div class="controls-group">
            <small style="color: #94a3b8; font-weight: bold;">VIEW BY DAY</small>
            <select id="dateFilter" onchange="renderTable()"></select>
        </div>

        <button class="btn btn-primary" onclick="document.getElementById('addForm').classList.toggle('active')">📍 Add New Stop</button>
        
        <!-- FORM WITH AUTOCOMPLETE HOOKS -->
        <div id="addForm" class="add-form">
            <input type="date" id="newDate">
            <div class="row">
                <input type="time" id="newDep" value="09:00">
                <small style="align-self: center;">Dep.</small>
            </div>
            <input type="text" id="newFrom" placeholder="Start Location..." list="geoList" oninput="doAutocomplete(this)">
            <input type="text" id="newTo" placeholder="End Location..." list="geoList" oninput="doAutocomplete(this)">
            <button class="btn btn-primary" onclick="handleAdd()">Save to Spreadsheet</button>
        </div>

        <!-- SHARED DATALIST FOR SEARCH RESULTS -->
        <datalist id="geoList"></datalist>

        <button id="saveBtn" class="btn btn-save" onclick="saveChanges()">💾 Save Sequence</button>

        <table>
            <thead>
                <tr>
                    <th></th>
                    <th>Itinerary</th>
                    <th>Schedule</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tripBody"></tbody>
        </table>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzf61RdUj5Qf71trNsdoQC0H9f8YlJFILKrddM8uvvzji_lPVtR0BDNuuGqLqkureiJ/exec"; 
    let trip = [];
    let currentTab = "";

    const map = L.map("map").setView([56.5, -4], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let routingControl, markers = [];

    // Initialize Reordering
    Sortable.create(document.getElementById('tripBody'), {
        handle: '.drag-handle',
        animation: 150,
        onEnd: () => {
            document.getElementById('saveBtn').style.display = 'block';
            reorderTripLocally();
        }
    });

    // --- SEARCH / AUTOCOMPLETE LOGIC ---
    let autoTimer;
    function doAutocomplete(input) {
        clearTimeout(autoTimer);
        const val = input.value;
        if (val.length < 3) return;

        autoTimer = setTimeout(async () => {
            try {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val)}&limit=5`;
                const r = await fetch(url);
                const d = await r.json();
                const list = document.getElementById("geoList");
                list.innerHTML = "";
                d.forEach(item => {
                    const opt = document.createElement("option");
                    const cleanAddress = item.display_name.split(',').slice(0,2).join(',');
                    opt.value = cleanAddress;
                    list.appendChild(opt);
                });
            } catch(e) { console.error("Search error", e); }
        }, 400); // 400ms debounce to save API calls
    }

    // --- CORE LOGIC ---
    async function loadData(tab = "") {
        showLoader(true);
        try {
            const res = await fetch(`${API}?tab=${encodeURIComponent(tab)}`);
            const json = await res.json();
            trip = json.trip;
            currentTab = json.currentTab;

            const sheetSelect = document.getElementById('sheetSelector');
            sheetSelect.innerHTML = json.sheets.map(s => `<option value="${s}" ${s === currentTab ? 'selected' : ''}>${s}</option>`).join('');
            
            buildDateFilter();
            renderTable();
        } catch(e) { console.error(e); }
        showLoader(false);
    }

    function buildDateFilter() {
        const dateSelect = document.getElementById('dateFilter');
        const uniqueDates = [...new Set(trip.map(t => formatDateDisplay(t.date)))];
        let html = `<option value="all">Full Itinerary View</option>`;
        uniqueDates.forEach(d => { html += `<option value="${d}">${d}</option>`; });
        dateSelect.innerHTML = html;
    }

    function formatDateDisplay(rawDate) {
        if (!rawDate) return "";
        const date = new Date(rawDate);
        if (isNaN(date.getTime())) return rawDate;
        const weekdays = ["dom", "lun", "mar", "mer", "gio", "ven", "sab"];
        return `${String(date.getDate()).padStart(2,'0')}-${String(date.getMonth()+1).padStart(2,'0')}-${date.getFullYear()} [${weekdays[date.getDay()]}]`;
    }

    function renderTable() {
        const tbody = document.getElementById("tripBody");
        tbody.innerHTML = "";
        const filterVal = document.getElementById('dateFilter').value;
        const visibleStops = trip.filter(t => filterVal === "all" || formatDateDisplay(t.date) === filterVal);

        visibleStops.forEach((t, i) => {
            const tr = document.createElement("tr");
            tr.dataset.index = i;
            tr.innerHTML = `
                <td><span class="drag-handle">☰</span></td>
                <td>
                    <strong>${t.from.split(',')[0]} → ${t.to.split(',')[0]}</strong>
                    <div class="route-info">
                        <span>${t.km || '--'} km</span>
                        <span>${t.hrs || ''}</span>
                    </div>
                </td>
                <td>
                    <div class="time-badge">Dep: ${t.dep || '09:00'}</div>
                    <div class="time-badge" style="background:#059669; margin-top:2px">Arr: ${t.arr || '--:--'}</div>
                </td>
                <td><button onclick="deleteRow(${i})" style="color:red; border:none; background:none; cursor:pointer">✕</button></td>
            `;
            tbody.appendChild(tr);
        });
        updateMap(visibleStops);
    }

    function updateMap(visibleStops) {
        if (routingControl) map.removeControl(routingControl);
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        let waypoints = [];

        visibleStops.forEach(t => {
            if (t.fromLat) {
                const p = L.latLng(t.fromLat, t.fromLon);
                markers.push(L.circleMarker(p, {radius:6, color:'#3b82f6', fillOpacity:0.8}).addTo(map).bindPopup(t.from));
                waypoints.push(p);
            }
            if (t.toLat) {
                const p = L.latLng(t.toLat, t.toLon);
                markers.push(L.circleMarker(p, {radius:6, color:'#10b981', fillOpacity:0.8}).addTo(map).bindPopup(t.to));
                waypoints.push(p);
            }
        });

        if (waypoints.length > 1) {
            routingControl = L.Routing.control({
                waypoints: waypoints,
                lineOptions: { styles: [{ color: '#3b82f6', opacity: 0.8, weight: 6 }] },
                createMarker: () => null,
                addWaypoints: false,
                draggableWaypoints: false,
                show: false
            }).addTo(map);
            map.fitBounds(new L.featureGroup(markers).getBounds().pad(0.2));
        }
    }

    function reorderTripLocally() {
        const rows = Array.from(document.querySelectorAll('#tripBody tr'));
        trip = rows.map(row => trip[row.dataset.index]);
        updateMap(trip);
    }

    async function saveChanges() {
        showLoader(true);
        await fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "saveAll", tab: currentTab, data: trip })
        });
        document.getElementById('saveBtn').style.display = 'none';
        loadData(currentTab);
    }

    async function handleAdd() {
        const data = {
            action: "add",
            tab: currentTab,
            date: document.getElementById('newDate').value,
            dep: document.getElementById('newDep').value,
            from: document.getElementById('newFrom').value,
            to: document.getElementById('newTo').value
        };
        showLoader(true);
        await fetch(API, { method: "POST", body: JSON.stringify(data) });
        document.getElementById('newFrom').value = "";
        document.getElementById('newTo').value = "";
        loadData(currentTab);
    }

    function createNewTab() {
        const name = prompt("Enter Trip Name:");
        if (!name) return;
        showLoader(true);
        fetch(API, {
            method: "POST",
            body: JSON.stringify({ action: "createSheet", tab: name })
        }).then(() => loadData(name));
    }

    function changeTab() { loadData(document.getElementById('sheetSelector').value); }
    function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

    loadData();
</script>
</body>
</html>
