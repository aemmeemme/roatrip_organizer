<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Roadtrip Pro Planner</title>
    <link rel="icon" type="image/x-icon" href="images/destination.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <!-- FullCalendar -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #0f172a; --sidebar: #020617; --accent: #3b82f6; --border: #1e293b; --text: #f8fafc; }
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; height: 60px; background: var(--sidebar); border-bottom: 1px solid var(--border); 
        }

        .container { display: grid; grid-template-columns: 460px 1fr; height: calc(100vh - 60px); }
        
        .sidebar { 
            background: var(--sidebar); overflow-y: auto; padding: 15px; 
            border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; 
        }

         /* MODE SWITCH STYLES */
        .mode-switch { display: flex; background: #1e293b; padding: 4px; border-radius: 20px; border: 1px solid var(--border); }
        .mode-btn { padding: 6px 15px; border-radius: 18px; cursor: pointer; font-size: 12px; font-weight: bold; border: none; background: none; color: #94a3b8; }
        .mode-btn.active { background: var(--accent); color: white; }

        /* AGENDA CONTAINER */
        #agendaView { display: none; padding: 20px; background: var(--bg); overflow-y: hidden; height: 92%; }
        .fc { color: white; background: #020617; border-radius: 8px; padding: 10px; overflow: hidden !important }
        .fc-timegrid-slot { height: 40px !important; border-bottom: 1px solid #1e293b !important; }

        /* Category Colors */
        .cat-food { background: #10b981 !important; }
        .cat-museum { background: #a855f7 !important; }
        .cat-culture { background: #f59e0b !important; }

        /* Border based on flag "Booked" Y/N */
        .cat-booked { border-left: 4px solid #03A300 !important; }
        .cat-no-booked { border-left: 4px solid #D10000 !important; }

        .controls-group { display: flex; flex-direction: column; gap: 8px; background: #1e293b; padding: 12px; border-radius: 8px; }
        .row { display: flex; gap: 8px; }
        
        select, input { 
            background: #0f172a; border: 1px solid #334155; color: white; 
            padding: 10px; border-radius: 6px; font-size: 13px; flex-grow: 1;
        }
        
        .add-form { 
            background: #1e293b; padding: 15px; border-radius: 8px; 
            display: none; flex-direction: column; gap: 10px; border: 1px solid var(--accent);
        }
        .add-form.active { display: flex; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th { text-align: left; padding: 8px; color: #94a3b8; border-bottom: 2px solid var(--border); }
        td { padding: 10px 1px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        
        .drag-handle { cursor: grab; color: #475569; font-size: 18px; padding-right: 8px; }
        .route-info { font-size: 11px; color: #94a3b8; margin-top: 4px; display: flex; gap: 8px; }
        .time-badge { background: #334155; padding: 2px 6px; border-radius: 4px; color: #fff; font-family: monospace; }

        .btn { cursor: pointer; border: none; border-radius: 4px; padding: 10px 15px; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-save { background: #10b981; color: white; width: 100%; margin-bottom: 10px; display: none; }
        .btn:hover { opacity: 0.8; }

        #map { height: 100%; background: #020617; }
        .leaflet-routing-container { display: none !important; }
        
        .loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: none; justify-content: center; 
            align-items: center; z-index: 9999; flex-direction: column; gap: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loading">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;"></div>
    <span>Processing Map...</span>
</div>

<header>
    <h1>🛣️️ Roadtrip Planner</h1>
    <div class="mode-switch">
            <button id="btnStd" class="mode-btn active" onclick="switchMode('standard')">Itinerary</button>
            <button id="btnAgd" class="mode-btn" onclick="switchMode('agenda')">Daily Agenda</button>
    </div>
    <div class="row">
        <select id="sheetSelector" onchange="changeTab()"></select>
        <button class="btn btn-primary" onclick="createNewTab()">+ New Trip</button>
    </div>
</header>

<div class="container">
    <div id="standardView" style="display: contents;">
        <div class="sidebar">
            <div class="controls-group">
                <small style="color: #94a3b8; font-weight: bold;">VIEW BY DAY</small>
                <select id="dateFilter" onchange="renderTable()"></select>
            </div>

            <button class="btn btn-primary" onclick="document.getElementById('addForm').classList.toggle('active')">📍 Add New Stop</button>

            <!-- FORM WITH AUTOCOMPLETE HOOKS -->
            <div id="addForm" class="add-form">
                <input type="date" id="newDate">
                <div class="row">
                    <input type="time" id="newDep" value="09:00">
                    <small style="align-self: center;">Dep.</small>
                </div>
                <input type="text" id="newFrom" placeholder="Start Location..." list="geoList" oninput="doAutocomplete(this)">
                <input type="text" id="newTo" placeholder="End Location..." list="geoList" oninput="doAutocomplete(this)">
                <button class="btn btn-primary" onclick="handleAdd()">Save to Spreadsheet</button>
            </div>

            <!-- SHARED DATALIST FOR SEARCH RESULTS -->
            <datalist id="geoList"></datalist>

            <button id="saveBtn" class="btn btn-save" onclick="saveChanges()">💾 Save Sequence</button>

            <table>
                <thead>
                    <tr>
                        <th></th>
                        <th>Itinerary</th>
                        <th>Schedule</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="tripBody"></tbody>
            </table>
        </div>
        <div id="map"></div>
    </div>
    <!-- NEW AGENDA VIEW -->
    <div id="agendaView" style="grid-column: 1 / -1;">
        <div id="calendar"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script src="script.js"></script>
</body>
</html>
